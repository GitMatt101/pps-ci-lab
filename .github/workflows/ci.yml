name: ci.yml
on:
  push: # On every push on any branch
  pull_request: # On every pull pull_request
    branches:
      - develop # On develop
      - master  # On master
jobs:
  Build:  # Job Name
    runs-on: ubuntu-latest # OS selection
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: JavaInstall # Install Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'
      - name: Build
        run: ./gradlew check

  UploadCoverage:
    runs-on: ubuntu-latest # OS selection
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: JavaInstall # Install Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'
      - name: Run Tests and Generate Report
        run: ./gradlew jacocoTestReport
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
